name: Angular CI

on:
  workflow_call:
    inputs:
      branch-name:
        required: true
        type: string
      project:
        required: false
        type: string
      codeartifact-domain:
        required: false
        type: string
      codeartifact-repo:
        required: false
        type: string
      codeartifact-domain-owner:
        required: false
        type: string
      aws-region:
        required: false
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-folder: ${{ steps.set-output.outputs.build-folder }}
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact-domain }}
      CODEARTIFACT_REPO: ${{ inputs.codeartifact-repo }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ inputs.codeartifact-domain-owner }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Configure AWS credentials
        if: ${{ env.CODEARTIFACT_DOMAIN != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure npm registries
        if: ${{ env.CODEARTIFACT_DOMAIN != '' && env.CODEARTIFACT_REPO != '' && env.CODEARTIFACT_DOMAIN_OWNER != '' }}
        run: |
          set -euo pipefail
          CODEARTIFACT_ENDPOINT="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPO" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"
          CODEARTIFACT_AUTH_TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --region "$AWS_REGION" \
            --query authorizationToken \
            --output text)"
          echo "::add-mask::$CODEARTIFACT_AUTH_TOKEN"
          CODEARTIFACT_REGISTRY="${CODEARTIFACT_ENDPOINT%/}/"
          CODEARTIFACT_HOST="${CODEARTIFACT_REGISTRY#https://}"

          {
            echo "registry=https://registry.npmjs.org/"
            echo "@vyracare:registry=$CODEARTIFACT_REGISTRY"
            echo "//$CODEARTIFACT_HOST:_authToken=$CODEARTIFACT_AUTH_TOKEN"
          } > .npmrc

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -n "$CODEARTIFACT_DOMAIN" ]; then
            npm install --legacy-peer-deps
          else
            npm ci
          fi

      - name: Build Angular App
        run: npm run build -- --configuration production
  
      - name: Get build path dynamically
        id: get-build-path
        run: |
          PROJECT="${{ inputs.project }}"
          if [ -z "$PROJECT" ]; then
            echo "Nenhum input recebido, detectando primeiro projeto do angular.json..."
            PROJECT=$(node -p "Object.keys(require('./angular.json').projects)[0]")
          fi
          echo "Usando projeto: $PROJECT"
          BUILD_PATH=$(node -p "require('./angular.json').projects[\"$PROJECT\"].architect.build.options.outputPath")
          echo "Usando o outputPath: $BUILD_PATH"
          echo "BUILD_PATH=$BUILD_PATH" >> $GITHUB_ENV
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: ${{ env.BUILD_PATH }}

      - name: Set build folder output
        id: set-output
        run: echo "build-folder=${{ env.BUILD_PATH }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact-domain }}
      CODEARTIFACT_REPO: ${{ inputs.codeartifact-repo }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ inputs.codeartifact-domain-owner }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Configure AWS credentials
        if: ${{ env.CODEARTIFACT_DOMAIN != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure npm registries
        if: ${{ env.CODEARTIFACT_DOMAIN != '' && env.CODEARTIFACT_REPO != '' && env.CODEARTIFACT_DOMAIN_OWNER != '' }}
        run: |
          set -euo pipefail
          CODEARTIFACT_ENDPOINT="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPO" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"
          CODEARTIFACT_AUTH_TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --region "$AWS_REGION" \
            --query authorizationToken \
            --output text)"
          echo "::add-mask::$CODEARTIFACT_AUTH_TOKEN"
          CODEARTIFACT_REGISTRY="${CODEARTIFACT_ENDPOINT%/}/"
          CODEARTIFACT_HOST="${CODEARTIFACT_REGISTRY#https://}"

          {
            echo "registry=https://registry.npmjs.org/"
            echo "@vyracare:registry=$CODEARTIFACT_REGISTRY"
            echo "//$CODEARTIFACT_HOST:_authToken=$CODEARTIFACT_AUTH_TOKEN"
          } > .npmrc

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -n "$CODEARTIFACT_DOMAIN" ]; then
            npm install --legacy-peer-deps
          else
            npm ci
          fi

      - name: Get build path dynamically
        id: get-build-path
        run: |
          PROJECT="${{ inputs.project }}"
          if [ -z "$PROJECT" ]; then
            echo "Nenhum input recebido, detectando primeiro projeto do angular.json..."
            PROJECT=$(node -p "Object.keys(require('./angular.json').projects)[0]")
          fi
          echo "Usando projeto: $PROJECT"
          BUILD_PATH=$(node -p "require('./angular.json').projects[\"$PROJECT\"].architect.build.options.outputPath")
          echo "BUILD_PATH=$BUILD_PATH" >> $GITHUB_ENV
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV 

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: ${{ env.BUILD_PATH }}

      - name: Run unit tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
