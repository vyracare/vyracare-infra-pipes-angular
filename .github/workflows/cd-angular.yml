name: Angular CD

on:
  workflow_call:
    inputs:
      branch-name:
        description: 'Branch que disparou o deploy'
        required: true
        type: string
      project:
        description: 'Nome do projeto Angular (igual ao angular.json)'
        required: false
        type: string
      codeartifact-domain:
        description: 'Nome do domain no AWS CodeArtifact'
        required: false
        type: string
      codeartifact-repo:
        description: 'Nome do repository no AWS CodeArtifact'
        required: false
        type: string
      codeartifact-domain-owner:
        description: 'Account owner do domain no AWS CodeArtifact'
        required: false
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      S3_BUCKET_NAME:
        required: false
      CLOUDFRONT_ID:
        required: false
      AWS_REGION:
        required: false
      AWS_ROLE_ARN:
        required: false
      PAT_TOKEN:
        required: true   # Token para abrir PR

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      CLOUDFRONT_ID: ${{ secrets.CLOUDFRONT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact-domain }}
      CODEARTIFACT_REPO: ${{ inputs.codeartifact-repo }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ inputs.codeartifact-domain-owner }}

    steps:
      # Checkout do cÃ³digo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout infra workflow repository
        uses: actions/checkout@v4
        with:
          repository: vyracare/vyracare-infra-pipes-angular
          ref: main
          path: .infra-pipes-angular
          token: ${{ secrets.PAT_TOKEN }}

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Instalar dependÃªncias
      # Obter build path dinamicamente do angular.json
      - name: Get build path dynamically
        id: get-build-path
        run: |
          PROJECT="${{ inputs.project }}"
          if [ -z "$PROJECT" ]; then
            echo "Nenhum input recebido, detectando primeiro projeto do angular.json..."
            PROJECT=$(node -p "Object.keys(require('./angular.json').projects)[0]")
          fi
          echo "Usando projeto: $PROJECT"
          BUILD_PATH=$(node -p "require('./angular.json').projects[\"$PROJECT\"].architect.build.options.outputPath")
          echo "Usando o outputPath: $BUILD_PATH"
          echo "BUILD_PATH=$BUILD_PATH" >> $GITHUB_ENV
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV

      - name: Resolve deployment context
        run: |
          set -euo pipefail

          branch_name="${{ inputs.branch-name }}"
          if [ "$branch_name" = "main" ]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_PATH_PREFIX=green" >> $GITHUB_ENV
            echo "RESOURCE_SUFFIX=" >> $GITHUB_ENV
          elif [ "$branch_name" = "release" ] || [[ "$branch_name" == release/* ]]; then
            echo "DEPLOY_ENV=hml" >> $GITHUB_ENV
            echo "DEPLOY_PATH_PREFIX=blue" >> $GITHUB_ENV
            echo "RESOURCE_SUFFIX=" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "DEPLOY_PATH_PREFIX=" >> $GITHUB_ENV
            echo "RESOURCE_SUFFIX=-dev" >> $GITHUB_ENV
          fi

      - name: Validate AWS credentials
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            if [ -z "${AWS_ROLE_ARN}" ]; then
              echo "Missing AWS credentials. Provide AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY or AWS_ROLE_ARN."
              exit 1
            fi
          fi

      # Configurar AWS CLI (Access Keys)
      - name: Configure AWS CLI (Access Keys)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Configurar AWS CLI (OIDC Role)
      - name: Configure AWS CLI (OIDC Role)
        if: ${{ (env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '') && env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: vyracare-angular-cd
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure npm registries
        if: ${{ env.CODEARTIFACT_DOMAIN != '' && env.CODEARTIFACT_REPO != '' && env.CODEARTIFACT_DOMAIN_OWNER != '' }}
        run: |
          set -euo pipefail
          CODEARTIFACT_ENDPOINT="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPO" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"
          CODEARTIFACT_AUTH_TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --region "$AWS_REGION" \
            --query authorizationToken \
            --output text)"
          echo "::add-mask::$CODEARTIFACT_AUTH_TOKEN"
          CODEARTIFACT_REGISTRY="${CODEARTIFACT_ENDPOINT%/}/"
          CODEARTIFACT_HOST="${CODEARTIFACT_REGISTRY#https://}"

          {
            echo "registry=https://registry.npmjs.org/"
            echo "@vyracare:registry=$CODEARTIFACT_REGISTRY"
            echo "//$CODEARTIFACT_HOST:_authToken=$CODEARTIFACT_AUTH_TOKEN"
          } > .npmrc

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -n "$CODEARTIFACT_DOMAIN" ]; then
            npm install --legacy-peer-deps --package-lock=false
          else
            npm ci
          fi

      - name: Validate Vyracare Design System package
        if: ${{ env.CODEARTIFACT_DOMAIN != '' }}
        run: |
          set -euo pipefail
          if ! node -e "const pkg=require('./package.json'); process.exit(pkg.dependencies?.['@vyracare/design-system'] ? 0 : 1)"; then
            echo "@vyracare/design-system is not a dependency. Skipping package validation."
            exit 0
          fi
          npm ls @vyracare/design-system
          test -f node_modules/@vyracare/design-system/package.json
          test -f node_modules/@vyracare/design-system/index.d.ts
          test -f node_modules/@vyracare/design-system/fesm2022/vyracare-design-system.mjs
          test -f node_modules/@vyracare/design-system/styles/_index.scss

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.2

      - name: Detect bucket and CloudFront
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY##*/}"
          bucket_name="$(echo "${repo_name}${RESOURCE_SUFFIX}" | tr '[:upper:]' '[:lower:]')"
          cloudfront_comment="${repo_name} (${DEPLOY_ENV}) em Angular CloudFront"

          echo "REPO_NAME=$repo_name" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=$bucket_name" >> $GITHUB_ENV
          echo "CLOUDFRONT_COMMENT=$cloudfront_comment" >> $GITHUB_ENV
          echo "Bucket name resolved to: $bucket_name"
          echo "CloudFront comment resolved to: $cloudfront_comment"

          if aws s3api head-bucket --bucket "$bucket_name" >/dev/null 2>&1; then
            s3_exists="true"
          else
            s3_exists="false"
          fi

          if [ -n "${DEPLOY_PATH_PREFIX}" ]; then
            cloudfront_path_prefix="/${DEPLOY_PATH_PREFIX}/"
          else
            cloudfront_path_prefix="/"
          fi

          cloudfront_id=$(aws cloudfront list-distributions | jq -r \
            --arg bucket "$bucket_name" \
            --arg comment "$cloudfront_comment" \
            --arg path_prefix "$cloudfront_path_prefix" '
              (
                [.DistributionList.Items[]?
                  | select(.Comment == $comment and (.Origins.Items[]?.DomainName | contains($bucket)))
                ][0].Id
              ) // (
                [.DistributionList.Items[]?
                  | select((.Origins.Items[]?.DomainName | contains($bucket)) and ((.Origins.Items[0].OriginPath // "") | startswith($path_prefix)))
                ][0].Id
              ) // empty
            ' | head -n 1)

          existing_oai_id=$(aws cloudfront list-distributions | jq -r \
            --arg bucket "$bucket_name" '
              [.DistributionList.Items[]?
                | select(.Origins.Items[]?.DomainName | contains($bucket))
                | .Origins.Items[0].S3OriginConfig.OriginAccessIdentity
              ][0] // empty
            ' | sed 's#origin-access-identity/cloudfront/##')

          if [ -n "$cloudfront_id" ] && [ "$cloudfront_id" != "None" ]; then
            echo "CLOUDFRONT_ID=$cloudfront_id" >> $GITHUB_ENV
          fi
          if [ -n "${existing_oai_id:-}" ]; then
            echo "EXISTING_OAI_ID=$existing_oai_id" >> $GITHUB_ENV
          fi

          echo "S3 exists: $s3_exists"
          echo "CloudFront ID: ${cloudfront_id:-none}"
          echo "Existing OAI ID: ${existing_oai_id:-none}"

          if [ "$s3_exists" = "true" ] && [ -n "${cloudfront_id:-}" ] && [ "$cloudfront_id" != "None" ]; then
            echo "NEED_INFRA=false" >> $GITHUB_ENV
            echo "Need infra: false"
          else
            echo "NEED_INFRA=true" >> $GITHUB_ENV
            echo "Need infra: true"
          fi

      - name: Provision CloudFront + Bucket
        if: env.NEED_INFRA == 'true'
        working-directory: ./.infra-pipes-angular/infra/cloudfront-bucket
        run: |
          set -euo pipefail

          export TF_INPUT=0
          export TF_IN_AUTOMATION=1
          export TF_VAR_project_name="${S3_BUCKET_NAME}"
          export TF_VAR_region="${AWS_REGION}"
          export TF_VAR_deployment_env="${DEPLOY_ENV}"
          export TF_VAR_cloudfront_comment="${REPO_NAME} (${DEPLOY_ENV}) em Angular CloudFront"

          terraform init

          bucket_name="${S3_BUCKET_NAME}"
          if aws s3api head-bucket --bucket "$bucket_name" >/dev/null 2>&1; then
            terraform import aws_s3_bucket.app_bucket "$bucket_name" || true
          fi
          if [ -n "${EXISTING_OAI_ID:-}" ]; then
            terraform import aws_cloudfront_origin_access_identity.shared_oai "${EXISTING_OAI_ID}" || true
          fi
          if [ -n "${CLOUDFRONT_ID:-}" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
            terraform import "aws_cloudfront_distribution.app_distribution[\"${DEPLOY_ENV}\"]" "${CLOUDFRONT_ID}" || true
          fi

          terraform apply -auto-approve \
            -var "project_name=$bucket_name" \
            -var "region=$AWS_REGION" \
            -var "deployment_env=$DEPLOY_ENV" \
            -var "cloudfront_comment=${REPO_NAME} (${DEPLOY_ENV}) em Angular CloudFront"

          bucket_name=$(terraform output -raw s3_bucket_name)
          cloudfront_id=$(terraform output -raw cloudfront_distribution_id)
          cloudfront_domain=$(terraform output -raw cloudfront_domain)
          echo "S3_BUCKET_NAME=$bucket_name" >> $GITHUB_ENV
          echo "CLOUDFRONT_ID=$cloudfront_id" >> $GITHUB_ENV
          echo "CLOUDFRONT_DOMAIN=$cloudfront_domain" >> $GITHUB_ENV
          echo "Provisioned bucket: $bucket_name"
          echo "Provisioned CloudFront ID: $cloudfront_id"
          echo "Provisioned CloudFront domain: $cloudfront_domain"

      - name: Wait for CloudFront to be deployed
        if: env.NEED_INFRA == 'true'
        run: |
          set -euo pipefail
          echo "Waiting for CloudFront distribution ${CLOUDFRONT_ID} to be deployed..."
          attempts=30
          interval=60
          for i in $(seq 1 $attempts); do
            status=$(aws cloudfront get-distribution --id "${CLOUDFRONT_ID}" | jq -r '.Distribution.Status')
            echo "[$i/$attempts] CloudFront status: ${status}"
            if [ "$status" = "Deployed" ]; then
              echo "CloudFront distribution deployed."
              exit 0
            fi
            sleep $interval
          done
          echo "CloudFront not deployed after $((attempts * interval))s. Continuing pipeline."

      - name: Resolve CloudFront domain
        run: |
          set -euo pipefail

          if [ -n "${CLOUDFRONT_DOMAIN:-}" ]; then
            echo "CloudFront domain already resolved: ${CLOUDFRONT_DOMAIN}"
            exit 0
          fi

          cloudfront_domain=$(aws cloudfront get-distribution --id "${CLOUDFRONT_ID}" | jq -r '.Distribution.DomainName')
          echo "CLOUDFRONT_DOMAIN=$cloudfront_domain" >> $GITHUB_ENV
          echo "Resolved CloudFront domain: $cloudfront_domain"

      - name: Carregar configuracao do shell orquestrador
        run: |
          set -euo pipefail

          if [ ! -f ".vyracare/orchestrator-shell.json" ]; then
            echo "HAS_ORCHESTRATOR_SHELL=false" >> $GITHUB_ENV
            echo "Nenhuma configuracao de shell orquestrador encontrada."
            exit 0
          fi

          python <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path(".vyracare/orchestrator-shell.json").read_text(encoding="utf-8"))
          repository = (config.get("repository") or "").strip()
          environment_file = (config.get("environmentFile") or "src/environments/environments.prod.ts").strip()
          remote_entry_property = (config.get("remoteEntryProperty") or "").strip()

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
            env_file.write(f"HAS_ORCHESTRATOR_SHELL={'true' if repository else 'false'}\n")
            env_file.write(f"SHELL_REPOSITORY={repository}\n")
            env_file.write(f"SHELL_ENVIRONMENT_FILE={environment_file}\n")
            env_file.write(f"SHELL_REMOTE_ENTRY_PROPERTY={remote_entry_property}\n")
          PY

      - name: Checkout shell orquestrador
        if: env.HAS_ORCHESTRATOR_SHELL == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SHELL_REPOSITORY }}
          path: .shell-orchestrator
          persist-credentials: false
          token: ${{ secrets.PAT_TOKEN }}
      # Detectar versÃ£o ativa/inativa
      - name: Capture current CloudFront origin path
        id: detect
        run: |
          CURRENT_PATH=$(aws cloudfront get-distribution --id ${{ env.CLOUDFRONT_ID }} | jq -r '.Distribution.Origins.Items[0].OriginPath')
          echo "CURRENT_PATH=$CURRENT_PATH" >> $GITHUB_ENV
          echo "previous-path=$CURRENT_PATH" >> $GITHUB_OUTPUT

      # Build Angular (after infra is ensured)
      - name: Build Angular
        run: npm run build -- --configuration production

      # Deploy para pasta inativa com timestamp
      - name: Deploy to environment folder with timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          if [ -n "${DEPLOY_PATH_PREFIX}" ]; then
            DEPLOY_FOLDER="$DEPLOY_PATH_PREFIX/$TIMESTAMP"
          else
            DEPLOY_FOLDER="$TIMESTAMP"
          fi
          if [ "${DEPLOY_ENV}" = "dev" ]; then
            aws s3 rm s3://${{ env.S3_BUCKET_NAME }}/blue --recursive || true
            aws s3 rm s3://${{ env.S3_BUCKET_NAME }}/versions --recursive || true
          fi
          echo "Deploying build to folder $DEPLOY_FOLDER"
          aws s3 sync ${{ env.BUILD_PATH }} s3://${{ env.S3_BUCKET_NAME }}/$DEPLOY_FOLDER --delete
          echo "DEPLOY_PATH=/$DEPLOY_FOLDER" >> $GITHUB_ENV

      # Cleanup builds antigas (mantendo 3 Ãºltimas)
      - name: Cleanup old builds
        run: |
          folder="${DEPLOY_PATH_PREFIX}"
          if [ -n "$folder" ]; then
            builds=$(aws s3 ls s3://${{ env.S3_BUCKET_NAME }}/$folder/ | awk '/PRE / {gsub("/","",$2); print $2}' | sort)
          else
            builds=$(aws s3 ls s3://${{ env.S3_BUCKET_NAME }}/ | awk '/PRE / {gsub("/","",$2); print $2}' | grep -vE '^(blue|green|versions)$' | sort || true)
          fi
          total=$(echo "$builds" | sed '/^$/d' | wc -l)
          if [ $total -gt 3 ]; then
            to_delete=$(echo "$builds" | sed '/^$/d' | head -n $(($total - 3)))
            for d in $to_delete; do
              if [ -n "$folder" ]; then
                aws s3 rm s3://${{ env.S3_BUCKET_NAME }}/$folder/$d --recursive
              else
                aws s3 rm s3://${{ env.S3_BUCKET_NAME }}/$d --recursive
              fi
            done
          fi

      # Swap CloudFront para nova versÃ£o
      - name: Swap CloudFront
        run: |
          DISTRIBUTION_CONFIG=$(aws cloudfront get-distribution-config --id ${{ env.CLOUDFRONT_ID }})
          ETAG=$(echo $DISTRIBUTION_CONFIG | jq -r '.ETag')
          CONFIG=$(echo $DISTRIBUTION_CONFIG | jq '.DistributionConfig')
          UPDATED_CONFIG=$(echo $CONFIG | jq --arg path "$DEPLOY_PATH" '.Origins.Items[0].OriginPath=$path')
          aws cloudfront update-distribution --id ${{ env.CLOUDFRONT_ID }} --if-match $ETAG --distribution-config "$UPDATED_CONFIG"

      # InvalidaÃ§Ã£o de cache CloudFront
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_ID }} --paths "/*"

      - name: Atualizar referencia no shell orquestrador
        if: env.HAS_ORCHESTRATOR_SHELL == 'true'
        run: |
          set -euo pipefail

          remote_entry_url="https://${CLOUDFRONT_DOMAIN}/remoteEntry.js"

          cd .shell-orchestrator
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${SHELL_REPOSITORY}.git"

          requested_branch="${{ inputs.branch-name }}"
          if git ls-remote --heads origin "${requested_branch}" | grep -q "${requested_branch}"; then
            target_branch="${requested_branch}"
          elif [ "${requested_branch}" = "release" ] || [[ "${requested_branch}" == release/* ]]; then
            echo "Branch release nao encontrada no shell orquestrador. Nenhuma atualizacao sera aplicada."
            exit 0
          elif git ls-remote --heads origin develop | grep -q develop; then
            target_branch="develop"
          else
            target_branch="main"
          fi

          git fetch origin "${target_branch}"
          git checkout -B "${target_branch}" "origin/${target_branch}"

          python <<PY
          from pathlib import Path
          import re

          file_path = Path("${SHELL_ENVIRONMENT_FILE}")
          property_name = "${SHELL_REMOTE_ENTRY_PROPERTY}"
          remote_entry_url = "${remote_entry_url}"

          content = file_path.read_text(encoding="utf-8")
          pattern = rf"({property_name}\s*:\s*')[^']*(')"

          if re.search(pattern, content):
              updated = re.sub(pattern, rf"\1{remote_entry_url}\2", content)
          else:
              updated = content.replace(
                  "};",
                  f"  {property_name}: '{remote_entry_url}'\\n}};"
              )

          if updated != content:
              file_path.write_text(updated, encoding="utf-8")
          PY

          if git diff --quiet -- "${SHELL_ENVIRONMENT_FILE}"; then
            echo "Nenhuma alteracao necessaria no shell orquestrador."
            exit 0
          fi

          git add "${SHELL_ENVIRONMENT_FILE}"
          git commit -m "fix: atualiza remote entry de ${REPO_NAME}"
          git push origin "${target_branch}"

      # Rollback em caso de falha
      - name: Rollback if failure
        if: failure() && steps.detect.outputs.previous-path != ''
        run: |
          echo "Rollback triggered. Reverting to previous version: ${{ steps.detect.outputs.previous-path }}"
          DISTRIBUTION_CONFIG=$(aws cloudfront get-distribution-config --id ${{ env.CLOUDFRONT_ID }})
          ETAG=$(echo $DISTRIBUTION_CONFIG | jq -r '.ETag')
          CONFIG=$(echo $DISTRIBUTION_CONFIG | jq '.DistributionConfig')
          UPDATED_CONFIG=$(echo $CONFIG | jq --arg path "${{ steps.detect.outputs.previous-path }}" '.Origins.Items[0].OriginPath=$path')
          aws cloudfront update-distribution --id ${{ env.CLOUDFRONT_ID }} --if-match $ETAG --distribution-config "$UPDATED_CONFIG"

